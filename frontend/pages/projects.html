<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TaskFlow Projects — Manage your team's projects">
  <title>Projects — TaskFlow</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-layout">
    <div class="main-content">
      <div class="page-header">
        <div>
          <h1>Projects</h1>
          <p>Manage and track your team's projects.</p>
        </div>
        <button class="btn btn-primary" id="addProjectBtn">+ New Project</button>
      </div>

      <div class="data-grid" id="projectsGrid">
        <div class="loader" style="grid-column:1/-1;"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- Project Modal -->
  <div class="modal-overlay" id="projectModalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="projectModalTitle">New Project</h2>
        <button class="modal-close" id="projectModalClose">&times;</button>
      </div>
      <form id="projectForm">
        <div class="modal-body">
          <input type="hidden" id="projectId">
          <div class="form-group">
            <label for="projectTitle">Project Title</label>
            <input type="text" id="projectTitle" placeholder="e.g. Website Redesign" required>
          </div>
          <div class="form-group">
            <label for="projectDescription">Description</label>
            <textarea id="projectDescription" rows="3" placeholder="Brief description of the project..."></textarea>
          </div>
          <div class="form-group">
            <label for="projectDeadline">Deadline</label>
            <input type="date" id="projectDeadline" required>
          </div>
          <div class="form-group">
            <label>Team Members</label>
            <div class="checkbox-list" id="membersCheckboxes">
              <!-- Populated by JS -->
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="projectCancelBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Project</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/projects.js"></script>
</body>
</html>
