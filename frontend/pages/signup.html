<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign up for TaskFlow — Team Task Manager">
  <title>Sign Up — TaskFlow</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="logo">
        <h1>TaskFlow</h1>
        <p>Create your account</p>
      </div>

      <div id="authAlert" class="alert alert-error"></div>

      <form id="signupForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required minlength="2">
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Minimum 6 characters" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/pages/login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
