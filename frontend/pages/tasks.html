<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TaskFlow Tasks — Create, assign and track team tasks">
  <title>Tasks — TaskFlow</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-layout">
    <div class="main-content">
      <div class="page-header">
        <div>
          <h1>Tasks</h1>
          <p>View and manage all tasks across projects.</p>
        </div>
        <button class="btn btn-primary" id="addTaskBtn">+ New Task</button>
      </div>

      <!-- Filters -->
      <div class="filters-bar">
        <select id="filterStatus">
          <option value="">All Status</option>
          <option value="Pending">Pending</option>
          <option value="In Progress">In Progress</option>
          <option value="Completed">Completed</option>
        </select>
        <select id="filterPriority">
          <option value="">All Priority</option>
          <option value="Low">Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
        </select>
        <select id="filterProject">
          <option value="">All Projects</option>
          <!-- Populated by JS -->
        </select>
      </div>

      <div class="data-grid" id="tasksGrid">
        <div class="loader" style="grid-column:1/-1;"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- Task Modal -->
  <div class="modal-overlay" id="taskModalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="taskModalTitle">New Task</h2>
        <button class="modal-close" id="taskModalClose">&times;</button>
      </div>
      <form id="taskForm">
        <div class="modal-body">
          <input type="hidden" id="taskId">
          <div class="form-group">
            <label for="taskTitle">Task Title</label>
            <input type="text" id="taskTitle" placeholder="e.g. Design homepage" required>
          </div>
          <div class="form-group">
            <label for="taskDescription">Description</label>
            <textarea id="taskDescription" rows="3" placeholder="Describe the task..."></textarea>
          </div>
          <div class="form-group">
            <label for="taskProject">Project</label>
            <select id="taskProject" required>
              <option value="">Select project...</option>
              <!-- Populated by JS -->
            </select>
          </div>
          <div class="form-group">
            <label for="taskAssignedTo">Assign To</label>
            <select id="taskAssignedTo">
              <option value="">Unassigned</option>
              <!-- Populated by JS -->
            </select>
          </div>
          <div class="form-group">
            <label for="taskPriority">Priority</label>
            <select id="taskPriority">
              <option value="Low">Low</option>
              <option value="Medium" selected>Medium</option>
              <option value="High">High</option>
            </select>
          </div>
          <div class="form-group">
            <label for="taskStatus">Status</label>
            <select id="taskStatus">
              <option value="Pending">Pending</option>
              <option value="In Progress">In Progress</option>
              <option value="Completed">Completed</option>
            </select>
          </div>
          <div class="form-group">
            <label for="taskDueDate">Due Date</label>
            <input type="date" id="taskDueDate" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="taskCancelBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Task</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/tasks.js"></script>
</body>
</html>
